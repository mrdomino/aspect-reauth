name: Build

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_call:
    inputs:
      release:
        default: false
        type: boolean
        description: "Whether we are building a release"

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        include:
          - os: macos
            arch: x86_64
          - os: macos
            arch: aarch64
          - os: windows
            arch: x86_64
          - os: ubuntu
            arch: x86_64
    steps:

    - name: setup environment
      shell: bash
      run: |
        set -u
        osname() {
          case $github_os in
            macos) echo apple-darwin ;;
            windows) echo pc-windows-msvc ;;
            ubuntu) echo unknown-linux-gnu ;;
            *) exit 1
          esac
        }
        suffix=
        if [[ windows = $github_os ]]; then
          suffix=.exe
        fi
        if [[ true = "$release" ]]; then
          profile=release
          retention_days=90
        else
          profile=fastbuild
          retention_days=7
        fi

        cat >>$GITHUB_ENV <<EOF
        target=${arch}-$(osname)
        suffix=$suffix
        profile=$profile
        retention_days=$retention_days
        EOF
      env:
        arch: ${{ matrix.arch }}
        github_os: ${{ matrix.os }}
        release: ${{ inputs.release }}

    - run: sudo sh -c 'apt update && apt install libdbus-1-dev'
      if: matrix.os == 'ubuntu'

    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
    - run: rustup toolchain install --profile minimal
    - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      with:
        key: ${{ env.profile }}-${{ env.target }}
    - run: rustup target add ${{ env.target }}

    - run: cargo build --locked --profile ${{ env.profile }} --target ${{ env.target }}
    - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
      with:
        name: aspect-reauth-${{ env.target }}
        path: target/${{ env.target }}/${{ env.profile }}/aspect-reauth${{ env.suffix }}
        retention-days: ${{ env.retention_days }}

    - run: cargo publish --locked --dry-run --target ${{ env.target }}
      if: inputs.release
